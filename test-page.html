<!DOCTYPE html>
<html>
<head>
  <title>Test - Salesforce Calendar</title>
  <style>
    body {
      background: linear-gradient(135deg, #032D60, #0D9DDA);
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    h1 { font-size: 48px; margin-bottom: 20px; }
    p { font-size: 24px; margin: 10px 0; }
    .box {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <h1>✅ IT WORKS!</h1>
  <p>This page loaded successfully from GitHub</p>
  <p>Time: <span id="time"></span></p>
  <div class="box">
    <p>If you can see this, the deployment is working!</p>
    <p style="font-size:16px;margin-top:20px;">The social calendar will load next...</p>
  </div>
  <script>
    setInterval(() => {
      document.getElementById('time').textContent = new Date().toLocaleString();
    }, 1000);
  </script>
</body>
</html>
